name: Publish Package

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write   # Mandatory for Trusted Publishing
  contents: read    # Mandatory to check out code

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20' # Mandatory: Must be 20 or higher
          # DO NOT include 'registry-url' here. 
          # It interferes with the OIDC/Trusted Publisher flow.

      - run: npm ci
      
      - run: node chore/updatePackage.js ${{ github.ref_name }}
      
      # This command triggers the passwordless exchange with npm
      - run: npm publish --provenance --access public