name: Publish Package

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20' # Use Node 20+ for Trusted Publishing support
          # REMOVE registry-url if you aren't using a secret token. 
          # npm will auto-detect the OIDC environment.

      - run: npm ci
      
      - run: node chore/updatePackage.js ${{ github.ref_name }}
      
      # Use --provenance to link the build to GitHub Actions
      # Use --access public if this is the first time publishing this package
      - run: npm publish --provenance --access public