name: Publish Package

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci
      
      # Ensure your script removes the 'v' from the version string!
      - run: node chore/updatePackage.js ${{ github.ref_name }}
      
      # 1. We double check the version is correct in the logs
      # 2. We publish while explicitly ignoring any local .npmrc auth
      - run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "Publishing version: $VERSION"
          npm publish --provenance --access public --registry=https://registry.npmjs.org/