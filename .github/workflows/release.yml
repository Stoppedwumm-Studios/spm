name: Publish Package

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write   # This allows GitHub to give npm a temporary OIDC token
  contents: read    # Allows the action to read your code

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20' # Use 20 or higher for OIDC support
          # DO NOT use registry-url here when using Trusted Publishing

      - run: npm ci
      
      - run: node chore/updatePackage.js ${{ github.ref_name }}
      
      # The --provenance flag is what triggers the OIDC "handshake" 
      # with the Trusted Publisher settings you just configured.
      - run: npm publish --provenance --access public